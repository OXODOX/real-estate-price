[pytest]
# 테스트 파일/클래스/함수 명명 규칙
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 테스트 마커 정의
# - fast     : 네트워크/DB 안 쓰는 순수 로직 테스트 (항상 실행)
# - slow     : 실제 MOLIT API 호출 — 쿼터 소비/수십초 소요 (기본 제외)
# - network  : 외부 API 의존 (MOLIT, JUSO, VWorld). slow 의 상위 개념
markers =
    fast: 순수 로직, 수 ms 안에 끝남
    slow: 네트워크/DB 호출 포함, 수 초~수십 초 소요
    network: 외부 API 호출 (MOLIT/JUSO/VWorld)

# 비동기 테스트 기본 모드 (pytest-asyncio)
asyncio_mode = auto

# 기본 실행 옵션: slow 는 명시적으로 요청할 때만
# (지금 slow 돌리려면: pytest -m slow  /  전체: pytest -m "")
addopts = -m "not slow" -ra --strict-markers
